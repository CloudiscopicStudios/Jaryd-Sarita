<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Jaryd &amp; Sarita Wedding</title>
  <script>
    // SPA redirect for GitHub Pages — keeps 1 path segment (the repo name)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?/' +
      l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
